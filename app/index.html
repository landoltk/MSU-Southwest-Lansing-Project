<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />

    <link

    <style>
        html, body { height: 100%; margin: 0; }
        #map { height: 100%; width: 100%; }

        .panel {
        position: absolute; z-index: 2; top: 100px; left: 12px;
        background: #fff; padding: 10px 12px; border-radius: 8px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.15);
        font: 13px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        max-width: 360px;
        }
        .panel code { background: #f1f5f9; padding: 0 4px; border-radius: 4px; }
        .btn {
        display: inline-block; padding: 6px 10px; border-radius: 6px;
        background: #2563eb; color: #fff; border: none; cursor: pointer;
        font: inherit;
        }
        .btn:disabled { background: #9ca3af; cursor: not-allowed; }
        .muted { color: #475569; }
    </style>

    <title>SWLP Prototype Map</title>

<body>

    <!--Need to add block selection to panel-->

        async function getSession() {
        // Returns an ArcGISIdentityManager
        // If not signed in, will redirect to ArcGIS to complete PKCE
            return arcgisRest.ArcGISIdentityManager.beginOAuth2({
                clientId,
                redirectUri,
                portal: portalUrl
            });

                COLOR_OUTLINE: '#065f46'
            };

            //establish base map object
            const map = new maplibregl.Map({
                container: 'map',
                center: [-84.582236, 42.697406],
                zoom: 12,
                style: 'static/map-style.json', //osm_liberty style json
            });
            map.addControl(new maplibregl.NavigationControl()); //basic controls
            
            map.once("load", async () => {
                //loads basemap using session token
                window.maplibreArcGIS.BasemapStyle.applyStyle(map, {style: "arcgis/navigation", token: session.token});

                //secured feature layer format

                //featureLayer.addSourcesAndLayersTo(map);

                //Michigan Blocks Layer

                const fl = await window.maplibreArcGIS.FeatureLayer.fromUrl(featureUrl);
                fl.addSourcesAndLayersTo(map);

                //on click popup
                map.on('click', fl.id, (e) => {
                    const f = e.features?.[0];

                    const props = f.properties || {};
