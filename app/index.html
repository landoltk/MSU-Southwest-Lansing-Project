<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>SWLP Prototype Map</title>

    <!-- MapLibre CSS -->
    <link
        href="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.css"
        rel="stylesheet"
    />

    <style>
        html, body { height: 100%; margin: 0; }
        #map { height: 100%; width: 100%; }
    </style>

    <link rel="stylesheet" href="static/style.css" />
</head>

<body>
    <h1>SWLP Prototype</h1>
    <div id="map"></div>

    <!-- MapLibre JS -->
    <script src="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.js"></script>

    <!-- MapLibre–ArcGIS plugin -->
    <script src="https://unpkg.com/@esri/maplibre-arcgis@1.1.0/dist/umd/maplibre-arcgis.min.js"></script>

    <!-- ArcGIS REST JS -->
    <script src="https://unpkg.com/@esri/arcgis-rest-request@^4/dist/bundled/request.umd.min.js"></script>

    <script>
        const CONFIG = {
            GEOJSON_URL: 'data/2010_Block_Groups.geojson',
            NAMES_TXT_URL: 'data/requested_bg.txt',
            COLOR_FILL: '#34d399',
            COLOR_OUTLINE: '#065f46'
        };

        // ArcGIS OAuth/portal config
        const clientId   = "X2bp68ntiEFGIOsd";
        const portalUrl  = "https://www.arcgis.com/sharing/rest";
        const redirectUri = "https://msu-southwest-lansing-project.onrender.com/callback.html";

        // Hosted FeatureLayer URL
        const blocksURL = "https://services.arcgis.com/uHAHKfH1Z5ye1Oe0/arcgis/rest/services/tl_2025_26_tabblock20/FeatureServer/0";

        const statusEl  = document.getElementById("status");
        const signoutEl = document.getElementById("signout");
        function setStatus(msg) { statusEl.textContent = msg; }

        // OAuth session management
        function restoreSession() {
            const saved = localStorage.getItem("__ARCGIS_OAUTH__");
            if (!saved) return null;
            try { return arcgisRest.ArcGISIdentityManager.deserialize(saved); }
            catch { return null; }
        }

        async function ensureSession() {
            const restored = restoreSession();
            if (restored) return restored;

            // Start PKCE sign-in, should return to root
            arcgisRest.ArcGISIdentityManager.beginOAuth2({
                clientId,
                redirectUri,
                portal: portalUrl,
                popup: false
            });

            return new Promise(() => {}); // unreachable
        }

        // Map + layer pull
        (async () => {
            try {
                setStatus("Checking sign-in…");
                const session = await ensureSession();
                setStatus("Signed in. Loading map…");
                signoutEl.disabled = false;

                // Create MapLibre map using osm liberty style json
                const map = new maplibregl.Map({
                container: 'map',
                center: [-84.582236, 42.697406],
                zoom: 12,
                style: 'static/map-style.json'
                });
                map.addControl(new maplibregl.NavigationControl());

                let fl = null;

                async function addBlocksLayer() {
                    // Obtain a token for feature service host
                    const tokenForService = await session.getToken(blocksURL);

                    // Create FeatureLayer and add to map
                    fl = await window.maplibreArcGIS.FeatureLayer.fromUrl(blocksURL, { token: tokenForService });
                    fl.addSourcesAndLayersTo(map);

                    // Click popup for layer
                    const lid = fl.layers()[0].id;
                    map.on('click', lid, (e) => {
                        const f = e.features?.[0];
                        if (!f) return;
                        new maplibregl.Popup()
                        .setLngLat(e.lngLat)
                        .setHTML(`<pre>${JSON.stringify(f.properties, null, 2)}</pre>`)
                        .addTo(map);
                    });
                }

                function removeBlocksLayer() {
                    if (!fl) return;
                    const layerIds = fl.layers().map(l => l.id);
                    const sourceIds = Object.keys(fl.sources());

                    // Remove layers then sources
                    for (const id of layerIds) {
                        if (map.getLayer(id)) map.removeLayer(id);
                    }
                    for (const sid of sourceIds) {
                        if (map.getSource(sid)) map.removeSource(sid);
                    }
                    fl = null;
                }

                map.once("load", async () => {
                    await addBlocksLayer();
                    setStatus("Ready.");
                });

                signoutEl.onclick = async () => {
                    try { await session.signOut(); } catch {}
                    localStorage.removeItem("__ARCGIS_OAUTH__");
                    window.location.reload();
                };

            } catch (err) {
                console.error(err);
                setStatus("Authentication error. See console for details.");
            }
        })();
    </script>
</body>
</html>
``
